    function useLocalState(key, initialValue) {

        try {

        } catch {
          return initialValue;

      return new Promise((resolve, reject) => {

        reader.onload = (event) => resolve(String(event?.target?.result || ''));
        reader.onerror = () => reject(reader.error || new Error('read-failed'));
        reader.readAsDataURL(file);
      });

    function loadImageElement(src) {
      return new Promise((resolve, reject) => {

        image.onerror = () => reject(new Error('image-load-failed'));
        image.src = src;
      });

    async function compressAvatarFile(file) {
      const rawDataUrl = await readFileAsDataUrl(file);
      try {
        const image = await loadImageElement(rawDataUrl);
        const maxSide = 320;
        const scale = Math.min(1, maxSide / Math.max(image.naturalWidth || 1, image.naturalHeight || 1));
        const width = Math.max(1, Math.round((image.naturalWidth || 1) * scale));
        const height = Math.max(1, Math.round((image.naturalHeight || 1) * scale));
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const context = canvas.getContext('2d');
        if (!context) return rawDataUrl;
        context.imageSmoothingEnabled = true;
        if ('imageSmoothingQuality' in context) context.imageSmoothingQuality = 'high';
        context.drawImage(image, 0, 0, width, height);
        return canvas.toDataURL('image/jpeg', 0.82);
      } catch {
        return rawDataUrl;
      }
    }

    function loadScriptOnce(src) {
      return new Promise((resolve, reject) => {
        const existing = document.querySelector(`script[data-src="${src}"]`);
        if (existing) {
          if (existing.dataset.loaded === 'true') {
            resolve(true);
            return;
          }
          existing.addEventListener('load', () => resolve(true), { once: true });
          existing.addEventListener('error', () => reject(new Error(`script-load-failed:${src}`)), { once: true });
          return;
        }
        const script = document.createElement('script');
        script.src = src;
        script.async = true;
        script.dataset.src = src;
        script.onload = () => {
          script.dataset.loaded = 'true';
          resolve(true);
        };
        script.onerror = () => reject(new Error(`script-load-failed:${src}`));
        document.head.appendChild(script);
      });
    }

    const DB_NAME = 'qs1000march_media_db_v1';
    const DB_VERSION = 1;
    const META_STORE = 'meta';
    const MEDIA_STORE = 'media';

    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains(META_STORE)) db.createObjectStore(META_STORE, { keyPath: 'key' });
          if (!db.objectStoreNames.contains(MEDIA_STORE)) db.createObjectStore(MEDIA_STORE, { keyPath: 'id' });
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }
    async function idbGetMeta(key) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(META_STORE, 'readonly');
        const req = tx.objectStore(META_STORE).get(key);
        req.onsuccess = () => resolve(req.result ? req.result.value : null);
        req.onerror = () => reject(req.error);
      });
    }
    async function idbSetMeta(key, value) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(META_STORE, 'readwrite');
        tx.objectStore(META_STORE).put({ key, value });
        tx.oncomplete = () => resolve(true);
        tx.onerror = () => reject(tx.error);
      });
    }
    async function idbPutMedia(item) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(MEDIA_STORE, 'readwrite');
        tx.objectStore(MEDIA_STORE).put(item);
        tx.oncomplete = () => resolve(item);
        tx.onerror = () => reject(tx.error);
      });

    async function idbGetMedia(id) {
      const db = await openDB();

        const tx = db.transaction(MEDIA_STORE, 'readonly');

        req.onsuccess = () => resolve(req.result || null);
        req.onerror = () => reject(req.error);
      });
    }
    async function idbDeleteMedia(id) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(MEDIA_STORE, 'readwrite');

        tx.oncomplete = () => resolve(true);

    function mergeFloat32Chunks(chunks) {
      const totalLength = (Array.isArray(chunks) ? chunks : []).reduce((sum, chunk) => sum + (chunk?.length || 0), 0);
      const result = new Float32Array(totalLength);
      let offset = 0;
      (Array.isArray(chunks) ? chunks : []).forEach((chunk) => {
        if (!chunk) return;
        result.set(chunk, offset);
        offset += chunk.length || 0;
      });
      return result;
    }
    function encodeWavBlob(samples, sampleRate) {
      const pcmSamples = samples instanceof Float32Array ? samples : new Float32Array(0);
      const buffer = new ArrayBuffer(44 + pcmSamples.length * 2);
      const view = new DataView(buffer);
      const writeString = (offset, value) => {
        for (let i = 0; i < value.length; i += 1) view.setUint8(offset + i, value.charCodeAt(i));
      };
      writeString(0, 'RIFF');
      view.setUint32(4, 36 + pcmSamples.length * 2, true);
      writeString(8, 'WAVE');
      writeString(12, 'fmt ');
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, 1, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * 2, true);
      view.setUint16(32, 2, true);
      view.setUint16(34, 16, true);
      writeString(36, 'data');
      view.setUint32(40, pcmSamples.length * 2, true);
      let offset = 44;
      for (let i = 0; i < pcmSamples.length; i += 1) {
        const value = Math.max(-1, Math.min(1, pcmSamples[i] || 0));
        view.setInt16(offset, value < 0 ? value * 0x8000 : value * 0x7FFF, true);
        offset += 2;
      }
      return new Blob([view], { type: 'audio/wav' });
    }
    async function startLocalAudioCapture() {
      if (!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia)) throw new Error('unsupported');
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) throw new Error('unsupported');
      const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } });
      const audioContext = new AudioContextClass();
      const source = audioContext.createMediaStreamSource(stream);
      const processor = audioContext.createScriptProcessor(4096, 1, 1);
      const silentGain = audioContext.createGain();
      silentGain.gain.value = 0;
      const chunks = [];
      let active = true;
      processor.onaudioprocess = (event) => {
        if (!active) return;
        const input = event.inputBuffer?.getChannelData(0);
        if (!input || !input.length) return;
        chunks.push(new Float32Array(input));
      };
      source.connect(processor);
      processor.connect(silentGain);
      silentGain.connect(audioContext.destination);
      return {
        state: 'recording',
        stream,
        async stop() {
          if (this.state === 'inactive') return null;
          this.state = 'inactive';
          active = false;
          try { processor.disconnect(); } catch {}
          try { source.disconnect(); } catch {}
          try { silentGain.disconnect(); } catch {}
          try { stream.getTracks().forEach((track) => track.stop()); } catch {}
          const samples = mergeFloat32Chunks(chunks);
          const sampleRate = audioContext.sampleRate || 44100;
          try { await audioContext.close(); } catch {}
          if (!samples.length) return null;
          return encodeWavBlob(samples, sampleRate);
        }
      };
    }

        setError('');

    function HomeGardenPanel({ account, onSave }) {

      function saveHome(nextPlots, nextCoins) { onSave({ ...account, homePlots: nextPlots, homeCoins: nextCoins }); }
      function plantSeed(plotId) { const cropPool = ['番茄','草莓','胡萝卜','玉米','蓝莓','生菜']; const nextPlots = plots.map((plot, idx) => plot.id === plotId ? { ...plot, crop: cropPool[idx % cropPool.length], stage: 1, ready: false } : plot); saveHome(nextPlots, coins); setMessages((prev) => ['你种下了一颗新种子。', ...prev].slice(0,5)); }
      function waterPlot(plotId) { const nextPlots = plots.map((plot) => plot.id !== plotId ? plot : { ...plot, stage: Math.min(3, plot.stage + 1), ready: Math.min(3, plot.stage + 1) === 3 }); saveHome(nextPlots, coins); setMessages((prev) => ['你给菜地浇了水，作物长得更快了。', ...prev].slice(0,5)); }
      function harvestPlot(plotId) { let gained = 0; const nextPlots = plots.map((plot) => { if (plot.id !== plotId || !plot.ready) return plot; gained = 15; return { ...plot, stage: 0, ready: false }; }); saveHome(nextPlots, coins + gained); if (gained) setMessages((prev) => [`你收获了一批作物，获得 ${gained} 家园币。`, ...prev].slice(0,5)); }
      function stealVeggie() { saveHome(plots, coins + 8); setMessages((prev) => ['你去好友菜园偷到了一点成熟蔬菜，获得 8 家园币。', ...prev].slice(0,5)); }
      const stageLabel = (stage) => ['空地','发芽','生长','成熟'][stage];
      return <Panel title="我的家园" icon={<Icons.Home />}><div className="space-y-5"><div className="grid gap-4 md:grid-cols-3"><div className="rounded-2xl border border-white/10 bg-white/5 p-4"><div className="text-sm text-slate-400">我的学校</div><div className="mt-2 text-lg font-semibold">{account.profile.school}</div></div><div className="rounded-2xl border border-white/10 bg-white/5 p-4"><div className="text-sm text-slate-400">家园币</div><div className="mt-2 text-lg font-semibold">{coins}</div></div><div className="rounded-2xl border border-white/10 bg-white/5 p-4"><div className="text-sm text-slate-400">快速操作</div><button onClick={stealVeggie} className="mt-2 rounded-2xl bg-pink-500 px-4 py-3 text-sm font-medium text-white">一键偷菜</button></div></div><div className="grid gap-4 md:grid-cols-3">{plots.map((plot)=><div key={plot.id} className="rounded-2xl border border-white/10 bg-white/5 p-4"><div className="mb-3 flex items-center justify-between"><div className="font-semibold">{plot.crop}</div><span className="rounded-full bg-white/10 px-3 py-1 text-xs">{stageLabel(plot.stage)}</span></div><div className="mb-4 flex h-28 items-center justify-center rounded-2xl bg-slate-900/70 text-4xl">{plot.stage===0?'🟫':plot.stage===1?'🌱':plot.stage===2?'🌿':'🥬'}</div><div className="grid grid-cols-3 gap-2"><button onClick={()=>plantSeed(plot.id)} className="rounded-2xl bg-white/10 px-3 py-2 text-xs font-medium">播种</button><button onClick={()=>waterPlot(plot.id)} className="rounded-2xl bg-white/10 px-3 py-2 text-xs font-medium">浇水</button><button onClick={()=>harvestPlot(plot.id)} className="rounded-2xl bg-emerald-500 px-3 py-2 text-xs font-medium text-white">收菜</button></div></div>)}</div><div className="rounded-2xl border border-white/10 bg-white/5 p-4"><div className="mb-2 text-sm text-slate-400">家园动态</div><div className="space-y-2">{messages.map((item,idx)=><div key={idx} className="rounded-2xl bg-slate-900/70 p-3 text-sm text-slate-200">{item}</div>)}</div></div></div></Panel>;
    }

    function LiveCenter({ currentAccount, rooms, setRooms, gifts, paymentConfig, activeRoomId, setActiveRoomId }) {
      const [mode, setMode] = useState('host');
      const [roomId, setRoomId] = useState(activeRoomId || rooms[0]?.id || 'room-1');
      const [hostName, setHostName] = useState(currentAccount.profile.name || '我的直播间');

      const [chatName, setChatName] = useState(currentAccount.profile.name || '观众1');
      const [chatInput, setChatInput] = useState('');
      const [danmakuInput, setDanmakuInput] = useState('');
      const [resolution, setResolution] = useState('1280x720');
      const [mirrorEnabled, setMirrorEnabled] = useState(true);
      const [rotateDeg, setRotateDeg] = useState(0);
      const [currentFacingMode, setCurrentFacingMode] = useState('user');
      const [isLive, setIsLive] = useState(false);
      const [liveSeconds, setLiveSeconds] = useState(0);
      const [likes, setLikes] = useState(0);
      const [danmakuCount, setDanmakuCount] = useState(0);
      const [viewerCount, setViewerCount] = useState(0);
      const [chatList, setChatList] = useState([]);
      const [logList, setLogList] = useState(['页面已加载，可直接开始测试直播原型']);
      const [shareText, setShareText] = useState('');
      const previewRef = useRef(null);
      const heartLayerRef = useRef(null);
      const danmakuLayerRef = useRef(null);
      const mediaStreamRef = useRef(null);
      const liveTimerRef = useRef(null);
      const viewerSetRef = useRef(new Set());
      const clientIdRef = useRef('client_' + Math.random().toString(36).slice(2, 10));
      const bcRef = useRef(null);

      const activeRoom = useMemo(() => rooms.find((r) => r.id === roomId) || rooms[0], [rooms, roomId]);

      useEffect(() => {
        setRoomId(activeRoomId || rooms[0]?.id || 'room-1');
      }, [activeRoomId, rooms]);

      useEffect(() => {
        if (activeRoom) {
          setStreamTitle(activeRoom.title || '欢迎来到我的直播');
          setLikes(activeRoom.likes || 0);
          setViewerCount(activeRoom.viewers || 0);
        }
      }, [activeRoom?.id]);

      useEffect(() => {
        setShareText(`${hostName || '主播'} 正在直播：${streamTitle || '未命名直播'} ｜ 房间号：${roomId}`);
      }, [hostName, streamTitle, roomId]);

      useEffect(() => {
        if ('BroadcastChannel' in window) {
          const bc = new BroadcastChannel('livego-prototype-channel');
          bcRef.current = bc;
          bc.onmessage = (event) => {
            const data = event.data || {};
            if (data.sender === clientIdRef.current) return;
            if (data.roomId !== roomId) return;

            if (data.type === 'viewer-join' && mode === 'host') {
              viewerSetRef.current.add(data.viewerId);
              setViewerCount((isLive ? 1 : 0) + viewerSetRef.current.size);
              addLog(`${data.name || '观众'} 进入直播间`);
              broadcast({ type:'sync-state', likes, danmakuCount, isLive, hostName, streamTitle, viewers: viewerSetRef.current.size });
            }
            if (data.type === 'sync-state') {
              setLikes(Number(data.likes || 0));
              setDanmakuCount(Number(data.danmakuCount || 0));
              if (mode === 'viewer') {
                setViewerCount(1 + Number(data.viewers || 0));
                if (data.hostName) setHostName(data.hostName);
                if (data.streamTitle) setStreamTitle(data.streamTitle);
                setIsLive(Boolean(data.isLive));
              }
            }
            if (data.type === 'live-status' && mode === 'viewer') {
              if (data.hostName) setHostName(data.hostName);
              if (data.streamTitle) setStreamTitle(data.streamTitle);
              setIsLive(Boolean(data.isLive));
            }
            if (data.type === 'like') {
              setLikes(Number(data.likes || 0));
              spawnHeart();
            }
            if (data.type === 'chat') {
              addChat(data.name || '观众', data.text || '', '聊天');
            }
            if (data.type === 'danmaku') {
              setDanmakuCount(Number(data.danmakuCount || 0));
              addChat(data.name || '观众', data.text || '', '弹幕');
              spawnDanmaku(`${data.name || '观众'}：${data.text || ''}`);
            }
          };
          return () => bc.close();
        }
      }, [roomId, mode, likes, danmakuCount, isLive, hostName, streamTitle]);

      useEffect(() => {
        if (previewRef.current) {
          const scaleX = mirrorEnabled ? -1 : 1;
          previewRef.current.style.transform = `scaleX(${scaleX}) rotate(${rotateDeg}deg)`;
        }
      }, [mirrorEnabled, rotateDeg]);

      useEffect(() => () => {
        clearInterval(liveTimerRef.current);
        if (mediaStreamRef.current) mediaStreamRef.current.getTracks().forEach(track => track.stop());
      }, []);

      function addLog(text) {
        setLogList(prev => [`[${new Date().toLocaleTimeString()}] ${text}`, ...prev].slice(0, 30));
      }
      function addChat(name, text, type='聊天') {
        setChatList(prev => [{ id: `${Date.now()}-${Math.random()}`, name, text, type, time: new Date().toLocaleTimeString() }, ...prev].slice(0, 60));
      }
      function broadcast(data) {
        bcRef.current?.postMessage({ roomId, sender: clientIdRef.current, ...data });
      }
      function parseResolution(value) {
        const [w,h] = value.split('x').map(Number);
        return { width:w, height:h };
      }
      async function stopCurrentStream() {
        if (mediaStreamRef.current) mediaStreamRef.current.getTracks().forEach(t => t.stop());
        mediaStreamRef.current = null;
        if (previewRef.current) previewRef.current.srcObject = null;
      }
      async function startCamera() {
        try {
          const { width, height } = parseResolution(resolution);
          await stopCurrentStream();
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: true,
            video: { width: { ideal: width }, height: { ideal: height }, facingMode: { ideal: currentFacingMode } }
          });
          mediaStreamRef.current = stream;
          if (previewRef.current) previewRef.current.srcObject = stream;
          addLog(`摄像头已打开（${width}×${height}）`);
        } catch (err) {
          console.error(err);
          addLog('打开摄像头失败，请检查浏览器权限、设备或 HTTPS');
          alert('打开摄像头失败，请检查浏览器权限、设备，或改用 localhost / HTTPS');
        }
      }
      function startLive() {
        if (!mediaStreamRef.current) return alert('请先打开摄像头');
        if (mode !== 'host') return alert('请先切换到主播端');
        if (isLive) return;
        setIsLive(true);
        setLiveSeconds(0);
        clearInterval(liveTimerRef.current);
        liveTimerRef.current = setInterval(() => setLiveSeconds(prev => prev + 1), 1000);
        addLog(`直播已开始，房间号：${roomId}`);
        setRooms(prev => prev.map(room => room.id === roomId ? { ...room, status: 'live', host: hostName, title: streamTitle, viewers: Math.max(room.viewers || 0, 1), likes } : room));
        broadcast({ type:'live-status', isLive:true, hostName, streamTitle, likes, danmakuCount });
      }
      function stopLive() {
        setIsLive(false);
        clearInterval(liveTimerRef.current);
        setLiveSeconds(0);
        addLog('直播已停止');
        setRooms(prev => prev.map(room => room.id === roomId ? { ...room, status: 'scheduled', host: hostName, title: streamTitle, viewers: viewerCount, likes } : room));
        broadcast({ type:'live-status', isLive:false, hostName, streamTitle, likes, danmakuCount });
      }
      function spawnHeart() {
        const container = heartLayerRef.current;
        if (!container) return;
        const el = document.createElement('div');
        el.className = 'absolute bottom-4 text-2xl animate-[floatUp_2.2s_linear_forwards]';
        el.textContent = ['💖','❤️','💕','💘'][Math.floor(Math.random()*4)];
        el.style.right = (20 + Math.random()*90) + 'px';
        el.style.filter = 'drop-shadow(0 4px 10px rgba(255,77,109,.4))';
        el.animate([
          { transform: 'translateY(0) scale(.9)', opacity: 0 },
          { transform: 'translateY(-320px) translateX(' + (-60 + Math.random()*120) + 'px) scale(1.35)', opacity: 0 }
        ], { duration: 2200, easing: 'linear' });
        container.appendChild(el);
        setTimeout(() => el.remove(), 2200);
      }
      function spawnDanmaku(text) {
        const container = danmakuLayerRef.current;
        if (!container) return;
        const el = document.createElement('div');
        el.className = 'absolute whitespace-nowrap font-extrabold text-[22px] text-white';
        el.textContent = text;
        el.style.top = (30 + Math.random()*60) + '%';
        el.style.textShadow = '0 2px 8px rgba(0,0,0,.7)';
        container.appendChild(el);
        el.animate([
          { transform: 'translateX(110%)' },
          { transform: 'translateX(-140%)' }
        ], { duration: 8000, easing: 'linear' });
        setTimeout(() => el.remove(), 8000);
      }
      function sendLike() {
        const nextLikes = likes + 1;
        setLikes(nextLikes);
        spawnHeart();
        addLog('收到一个点赞');
        setRooms(prev => prev.map(room => room.id === roomId ? { ...room, likes: nextLikes } : room));
        broadcast({ type:'like', likes: nextLikes });
      }
      function sendDanmakuAction() {
        const text = danmakuInput.trim();
        if (!text) return;
        const nextCount = danmakuCount + 1;
        setDanmakuCount(nextCount);
        addChat(chatName || '观众', text, '弹幕');
        spawnDanmaku(`${chatName || '观众'}：${text}`);
        broadcast({ type:'danmaku', name: chatName || '观众', text, danmakuCount: nextCount });
        setDanmakuInput('');
      }
      function sendChat() {
        const text = chatInput.trim();
        if (!text) return;
        addChat(chatName || '观众', text, '聊天');
        broadcast({ type:'chat', name: chatName || '观众', text });
        setChatInput('');
      }
      function switchMode(nextMode) {
        setMode(nextMode);
        addLog(`已切换到${nextMode === 'host' ? '主播端' : '观众端'}`);
        if (nextMode === 'viewer') {
          broadcast({ type:'viewer-join', viewerId: clientIdRef.current, name: chatName || '观众' });

        const s = String(total % 60).padStart(2, '0');

      return <div className="space-y-6">

                  <video ref={previewRef} autoPlay playsInline muted className="h-full w-full object-cover bg-black" />
                  <div ref={danmakuLayerRef} className="pointer-events-none absolute inset-0 overflow-hidden"></div>

                    <div className="rounded-full border border-white/10 bg-black/50 px-3 py-1 text-xs font-semibold">👀 {viewerCount} 人观看</div>

    const RADIO_STORAGE_KEY = 'qs1000_listen_world_favorites_v1';
    const RADIO_LANGUAGE_OPTIONS = [
      ['english','英文'], ['chinese','中文'], ['japanese','日文'], ['korean','韩文'], ['malay','马来语'], ['thai','泰语'], ['hindi','印地语'], ['arabic','阿拉伯语'], ['spanish','西班牙语'], ['french','法语'], ['german','德语'], ['indonesian','印尼语']
    ];
    const RADIO_COUNTRY_OPTIONS = ['all','Malaysia','Singapore','China','Japan','South Korea','Thailand','India','Indonesia','United States','United Kingdom','Australia','France','Germany','Spain','Saudi Arabia'];
    const RADIO_LABELS = Object.fromEntries(RADIO_LANGUAGE_OPTIONS);
    const RADIO_QUERY_MAP = {
      english: [{ language: 'english' }, { country: 'United States' }, { country: 'United Kingdom' }],
      chinese: [{ language: 'chinese' }, { language: 'mandarin' }, { language: 'cantonese' }],
      japanese: [{ language: 'japanese' }, { country: 'Japan' }],
      korean: [{ language: 'korean' }, { country: 'South Korea' }],
      malay: [{ language: 'malay' }, { language: 'bahasa melayu' }, { country: 'Malaysia' }],
      thai: [{ language: 'thai' }, { country: 'Thailand' }],
      hindi: [{ language: 'hindi' }, { country: 'India' }],
      arabic: [{ language: 'arabic' }, { country: 'Saudi Arabia' }, { country: 'Egypt' }],
      spanish: [{ language: 'spanish' }, { country: 'Spain' }, { country: 'Mexico' }],
      french: [{ language: 'french' }, { country: 'France' }],
      german: [{ language: 'german' }, { country: 'Germany' }],
      indonesian: [{ language: 'indonesian' }, { language: 'bahasa indonesia' }, { country: 'Indonesia' }],
    };
    function getRadioFavorites() {
      try { return JSON.parse(localStorage.getItem(RADIO_STORAGE_KEY) || '[]'); } catch { return []; }
    }
    function setRadioFavorites(list) {
      try { localStorage.setItem(RADIO_STORAGE_KEY, JSON.stringify(list)); } catch {}
    }
    function normalizeRadioText(value='') {
      return String(value || '').trim().toLowerCase();
    }
    function detectRadioCodec(url='') {
      const lower = String(url || '').toLowerCase();
      if (lower.includes('.m3u8')) return 'HLS';
      if (lower.includes('aac')) return 'AAC';
      if (lower.includes('mp3')) return 'MP3';
      return 'STREAM';
    }
    function radioLogoLetter(name='') {
      const first = String(name || '?').trim().charAt(0).toUpperCase();
      return /[A-Z0-9]/.test(first) ? first : '听';
    }
    function displayRadioCountry(country='') {
      return country || 'Global';
    }
    function ListenWorldPanel() {
      const [stations, setStations] = useState([]);

      const [search, setSearch] = useState('');
      const [onlyFavorites, setOnlyFavorites] = useState(false);
      const [favorites, setFavoritesState] = useState(() => getRadioFavorites());
      const [currentStation, setCurrentStation] = useState(null);
      const [page, setPage] = useState(1);
      const audioRef = useRef(null);
      const hlsRef = useRef(null);

      const loadStations = async (lang = language) => {
        setLoading(true);
        setStatus('正在从世界各地加载电台...');
        try {
          const queries = RADIO_QUERY_MAP[lang] || [{ language: lang }];
          const responses = await Promise.all(queries.map((params) => {
            const url = new URL('https://de1.api.radio-browser.info/json/stations/search');
            Object.entries({ hidebroken: 'true', limit: '60', order: 'votes', reverse: 'true', ...params }).forEach(([k, v]) => url.searchParams.set(k, v));
            return fetch(url.toString()).then((r) => r.json()).catch(() => []);
          }));
          const merged = [];
          const seen = new Set();
          responses.flat().forEach((item) => {
            const source = item.url_resolved || item.url || '';
            if (!source || seen.has(source)) return;
            const codec = detectRadioCodec(source);
            if (!/^https?:/i.test(source)) return;
            seen.add(source);
            merged.push({
              id: item.stationuuid || source,
              name: item.name || '未命名电台',
              source,
              homepage: item.homepage || '',
              favicon: item.favicon || '',
              tags: item.tags || '',
              country: item.country || '',
              language: normalizeRadioText(item.language || lang),
              codec,
              votes: Number(item.votes || 0),
              bitrate: Number(item.bitrate || 0),
            });
          });
          setStations(merged.slice(0, 120));
          setStatus(merged.length ? `已载入 ${merged.length} 个全球电台，可直接在“听一听”里播放。` : '这次没有抓到可播放电台，请切换语言或重试。');
          setPage(1);
        } catch (err) {
          setStations([]);
          setStatus('加载世界电台失败，请稍后重试。');
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => { loadStations('english'); }, []);
      useEffect(() => {
        return () => {
          if (hlsRef.current) {
            try { hlsRef.current.destroy(); } catch {}
            hlsRef.current = null;
          }
        };
      }, []);

      const filteredStations = useMemo(() => {
        let list = onlyFavorites ? favorites.slice() : stations.slice();
        if (country !== 'all') list = list.filter((item) => item.country === country);
        if (search.trim()) {
          const keyword = normalizeRadioText(search);
          list = list.filter((item) => [item.name, item.country, item.language, item.tags].some((v) => normalizeRadioText(v).includes(keyword)));
        }
        return list.sort((a, b) => (b.votes - a.votes) || a.name.localeCompare(b.name));
      }, [stations, favorites, onlyFavorites, country, search]);

      const pagedStations = useMemo(() => {
        const start = (page - 1) * 12;
        return filteredStations.slice(start, start + 12);
      }, [filteredStations, page]);
      const totalPages = Math.max(1, Math.ceil(filteredStations.length / 12));
      useEffect(() => { if (page > totalPages) setPage(1); }, [totalPages]);

      const playStation = async (station) => {
        const audio = audioRef.current;
        if (!audio || !station) return;
        setCurrentStation(station);
        setStatus(`正在连接 ${station.name} ...`);
        if (hlsRef.current) {
          try { hlsRef.current.destroy(); } catch {}
          hlsRef.current = null;
        }
        try {
          audio.pause();
          audio.removeAttribute('src');
          audio.load();
          if (station.codec === 'HLS') {
            const HlsClass = await ensureHlsSupport().catch(() => null);
            if (HlsClass && HlsClass.isSupported()) {
              const hls = new HlsClass();
              hls.loadSource(station.source);
              hls.attachMedia(audio);
              hlsRef.current = hls;
            } else {
              audio.src = station.source;
            }
          } else {
            audio.src = station.source;
          }
          await audio.play();
          setStatus(`正在播放 ${station.name} · ${displayRadioCountry(station.country)}`);

      const toggleFavorite = (station) => {

shed border-white/10 bg-white/5 p-3"><div className="mb-2 text-xs text-slate-400">评论图片 / 表情包（最多 9 张，可和文字一起发）</div><input type="file" accept="image/*" multiple onChange={(e)=>handleVideoCommentImages(currentVideoFeedPost.id, e)} className="block w-full text-sm text-slate-300" />{(videoCommentImageDrafts[currentVideoFeedPost.id] || []).length > 0 && <div className="mt-3 space-y-3"><div className="grid grid-cols-3 gap-2 sm:grid-cols-4 md:grid-cols-5">{(videoCommentImageDrafts[currentVideoFeedPost.id] || []).map((img, idx)=><img key={img.mediaId || idx} src={img.localPreviewSrc || img.src} alt={img.name || `comment-image-${idx}`} className="h-20 w-full rounded-2xl object-cover" />)}</div><button onClick={()=>clearVideoCommentImages(currentVideoFeedPost.id)} className="rounded-2xl bg-white/10 px-4 py-2 text-sm font-medium text-white">清空评论图片</button></div>}</div><div className="flex flex-wrap gap-2"><button onClick={()=>addVideoTextComment(currentVideoFeedPost.id)} className="rounded-2xl bg-pink-500 px-4 py-3 text-sm font-medium text-white">发送评论</button>{videoRecordingPostId===currentVideoFeedPost.id && videoRecorderState==='recording' ? <button onClick={()=>stopVideoVoiceComment(currentVideoFeedPost.id)} className="rounded-2xl bg-emerald-500 px-4 py-3 text-sm font-medium text-white">结束语音并发送</button> : <button onClick={()=>startVideoVoiceComment(currentVideoFeedPost.id)} className="rounded-2xl bg-white/10 px-4 py-3 text-sm font-medium text-white">语音评论</button>}</div>{videoRecordingPostId===currentVideoFeedPost.id && videoRecorderState==='recording' && <div className="rounded-2xl bg-emerald-500/10 px-4 py-3 text-sm text-emerald-100">录音中，结束后会先实时存到本地，再挂到视频评论区。</div>}{Object.keys(videoCommentLivePreview).length > 0 && currentVideoFeedPost.comments && currentVideoFeedPost.comments.some((comment) => comment.audio?.mediaId && videoCommentLivePreview[comment.audio.mediaId]) && <div className="rounded-2xl bg-white/5 px-4 py-3 text-xs text-slate-300">这条视频下的新语音评论已优先走本地播放，刷新后也会继续从本地数据库读取。</div>}<div className="space-y-3">{(!currentVideoFeedPost.comments || currentVideoFeedPost.comments.length===0) && <div className="text-sm text-slate-500">还没有评论，发第一条吧。</div>}{(currentVideoFeedPost.comments || []).map((comment)=><div key={comment.id} className="flex items-start gap-3 rounded-2xl bg-white/5 p-3"><img src={comment.avatar} alt={comment.author} className="h-9 w-9 rounded-full object-cover" /><div className="min-w-0 flex-1"><div className="flex flex-wrap items-center gap-2"><span className="text-sm font-medium text-white">{comment.author}</span><span className="text-xs text-slate-400">{currentDateTimeLabel(comment.createdAt || Date.now())}</span>{comment.audio && <span className="rounded-full bg-emerald-500/20 px-2 py-0.5 text-[11px] text-emerald-200">语音</span>}{(comment.username===currentUsername || isAdminSession) && <button onClick={()=>deleteVideoComment(currentVideoFeedPost.id, comment.id, isAdminSession)} className="rounded-full bg-rose-500 px-3 py-1 text-[11px] font-medium text-white">{isAdminSession ? '管理员删除评论' : '删除我的评论'}</button>}</div>{comment.text && <div className="mt-1 whitespace-pre-wrap text-sm text-slate-300">{comment.text}</div>}{comment.images && comment.images.length > 0 && <div className="mt-3 grid grid-cols-3 gap-2">{comment.images.slice(0,9).map((image, idx)=><MediaTile key={image.mediaId || idx} media={image} className="h-24 w-full rounded-2xl object-cover bg-slate-950/60" />)}</div>}{comment.audio && <AudioCommentPlayer audio={comment.audio} />}</div></div>)}</div></div></div></>}</div></Panel><Panel title="下面的视频流" icon={<Icons.Video />}><div className="space-y-5">{secondaryVideoPosts.length===0 && <div className="rounded-2xl bg-white/5 p-4 text-sm text-slate-400">后面的视频会继续按大卡片样式排在这里。</div>}{secondaryVideoPosts.map((post)=>{ const postIndex = orderedVideoPosts.findIndex((item)=>item.id===post.id); const isImageStory = post.postType === 'imageStory'; return <div key={post.id} className="rounded-[28px] border border-white/10 bg-white/5 p-4"><div className="mb-4 flex items-center justify-between gap-3"><div className="flex items-center gap-3"><img src={post.avatar} alt={post.author} className="h-11 w-11 rounded-full object-cover" /><div className="min-w-0"><div className="truncate text-sm font-semibold text-white">{post.author}</div><div className="text-xs text-slate-400">{post.school} · {currentDateTimeLabel(post.createdAt)}</div></div></div><button onClick={()=>setVideoFeedIndex(postIndex)} className="rounded-2xl bg-pink-500 px-4 py-2 text-sm font-medium text-white">切到这条</button></div><div className="overflow-hidden rounded-[24px] bg-slate-950/60">{isImageStory ? <ImageStoryPlayer images={post.media || []} music={post.music} /> : <MediaTile media={(post.media || [])[0]} className="max-h-[680px] w-full bg-black object-contain" />}</div>{post.caption && <div className="mt-4 whitespace-pre-wrap text-sm leading-7 text-slate-300">{post.caption}</div>}<div className="mt-4 flex flex-wrap gap-2 text-xs text-slate-400"><span className="rounded-full bg-white/10 px-3 py-1">{post.likes || 0} 赞</span><span className="rounded-full bg-white/10 px-3 py-1">{(post.comments || []).length} 评论</span><span className="rounded-full bg-pink-500/20 px-3 py-1 text-pink-200">下面继续保持和第一条一样的大样式</span></div></div>; })}</div></Panel></div><Panel title="发布视频号" icon={<Icons.Video />}><div className="space-y-4"><div className="rounded-2xl bg-white/5 px-4 py-3 text-sm text-slate-300">视频号保持首条大展示，下面的视频也统一成大卡片样式。语音评论会转成更稳定的 WAV 本地播放。</div><div className="flex flex-wrap gap-2"><button type="button" onClick={()=>setVideoPublishMode('video')} className={`rounded-2xl px-4 py-2 text-sm font-medium ${videoPublishMode==='video' ? 'bg-pink-500 text-white' : 'bg-white/10 text-slate-200'}`}>短视频</button><button type="button" onClick={()=>setVideoPublishMode('images')} className={`rounded-2xl px-4 py-2 text-sm font-medium ${videoPublishMode==='images' ? 'bg-pink-500 text-white' : 'bg-white/10 text-slate-200'}`}>图片视频风格</button></div><textarea value={videoCaptionDraft} onChange={(e)=>setVideoCaptionDraft(e.target.value)} className="min-h-[110px] w-full rounded-2xl border border-white/10 bg-slate-900/70 px-4 py-3 text-white outline-none" placeholder="写一段视频文案，支持校园日常 / 探店 / 学习记录 / 心情碎片..." />{videoPublishMode==='video' && <div className="rounded-2xl border border-dashed border-white/15 bg-white/5 p-4"><div className="mb-2 text-sm text-slate-400">上传短视频</div><input type="file" accept="video/*" onChange={handleVideoChannelUpload} className="block w-full text-sm text-slate-300" />{videoDraft && <div className="mt-4 space-y-3"><video src={videoDraft.previewUrl} controls playsInline className="max-h-[260px] w-full rounded-[20px] bg-black" /><div className="text-xs text-slate-400">已选择：{videoDraft.name}</div></div>}</div>}{videoPublishMode==='images' && <div className="space-y-4 rounded-2xl border border-dashed border-white/15 bg-white/5 p-4"><div><div className="mb-2 text-sm text-slate-400">上传图片（最多 36 张）</div><input type="file" accept="image/*" multiple onChange={handleVideoImageChannelUpload} className="block w-full text-sm text-slate-300" />{videoImageDrafts.length > 0 && <div className="mt-4 grid grid-cols-3 gap-3 sm:grid-cols-4">{videoImageDrafts.map((img)=><img key={img.id} src={img.previewUrl} alt={img.name} className="h-20 w-full rounded-2xl object-cover" />)}</div>}</div><div><div className="mb-2 text-sm text-slate-400">配音乐（可选）</div><input type="file" accept="audio/*" onChange={handleVideoMusicUpload} className="block w-full text-sm text-slate-300" />{videoMusicDraft && <div className="mt-3 rounded-2xl bg-slate-900/70 p-3"><div className="mb-2 text-xs text-slate-400">已选择：{videoMusicDraft.name}</div><audio src={videoMusicDraft.previewUrl} controls className="w-full" preload="metadata" /></div>}</div>{videoImageDrafts.length > 0 && <div className="rounded-2xl bg-slate-900/40 p-3"><ImageStoryPlayer images={videoImageDrafts.map((item) => ({ kind: 'image', src: item.previewUrl, name: item.name, mediaId: item.id }))} music={videoMusicDraft ? { src: videoMusicDraft.previewUrl, name: videoMusicDraft.name, mediaId: videoMusicDraft.id } : null} /></div>}</div>}{videoPublishNotice && <div className="rounded-2xl bg-white/10 px-4 py-3 text-sm text-slate-200">{videoPublishNotice}</div>}<div className="grid gap-3 md:grid-cols-2"><button onClick={publishVideoPost} className="rounded-2xl bg-pink-500 px-5 py-3 text-sm font-medium text-white">发布到视频号</button><button onClick={()=>{ setVideoCaptionDraft(''); clearVideoDraft(); }} className="rounded-2xl bg-white/10 px-5 py-3 text-sm font-medium">清空</button></div></div></Panel></div>}
      {mainTab==='favorites' && <div className="space-y-6">
        <div className="grid gap-6 lg:grid-cols-2">
          <Panel title="我点赞的视频号" icon={<Icons.Heart />}>
            <div className="space-y-4">
              {likedVideoPosts.length===0 && <div className="rounded-2xl bg-white/5 p-4 text-sm text-slate-400">你点赞的视频号内容会显示在这里。</div>}
              {likedVideoPosts.map((post)=><div key={post.id} className="rounded-[24px] border border-white/10 bg-white/5 p-4"><div className="mb-3 flex items-center gap-3"><img src={post.avatar} alt={post.author} className="h-11 w-11 rounded-full object-cover" /><div className="min-w-0 flex-1"><div className="font-semibold">{post.author}</div><div className="text-xs text-slate-400">{post.school} · {currentDateTimeLabel(post.createdAt)}</div></div></div><div className="text-sm whitespace-pre-wrap text-slate-300">{post.caption || '这个视频还没有写文案。'}</div><div className="mt-3 flex flex-wrap gap-2"><button onClick={()=>setMainTab('videoFeed')} className="rounded-2xl bg-white/10 px-4 py-2 text-sm font-medium">去查看</button><button onClick={()=>toggleVideoLike(post.id)} className="rounded-2xl bg-pink-500 px-4 py-2 text-sm font-medium text-white">取消点赞</button></div></div>)}
            </div>
          </Panel>
          <Panel title="我收藏的视频号" icon={<Icons.Star />}>
            <div className="space-y-4">
              {favoriteVideoPosts.length===0 && <div className="rounded-2xl bg-white/5 p-4 text-sm text-slate-400">你收藏的视频号内容会显示在这里。</div>}
              {favoriteVideoPosts.map((post)=><div key={post.id} className="rounded-[24px] border border-white/10 bg-white/5 p-4"><div className="mb-3 flex items-center gap-3"><img src={post.avatar} alt={post.author} className="h-11 w-11 rounded-full object-cover" /><div className="min-w-0 flex-1"><div className="font-semibold">{post.author}</div><div className="text-xs text-slate-400">{post.school} · {currentDateTimeLabel(post.createdAt)}</div></div></div><div className="text-sm whitespace-pre-wrap text-slate-300">{post.caption || '这个视频还没有写文案。'}</div><div className="mt-3 flex flex-wrap gap-2"><button type="button" onClick={()=>setMainTab('videoFeed')} className="rounded-2xl bg-white/10 px-4 py-2 text-sm font-medium">去查看</button><button type="button" onClick={()=>toggleVideoFavorite(post.id)} className="rounded-2xl bg-amber-500 px-4 py-2 text-sm font-medium text-white">取消收藏</button></div></div>)}
            </div>
          </Panel>
        </div>
        <div className="grid gap-6 lg:grid-cols-2">
          <Panel title="我收藏的附近的人" icon={<Icons.Users />}>
            <div className="space-y-3">
              {favoriteDiscoverProfiles.length===0 && <div className="rounded-2xl bg-white/5 p-4 text-sm text-slate-400">你在附近的人里收藏过的资料会显示在这里。</div>}
              {favoriteDiscoverProfiles.map((user)=><div key={user.id} className="rounded-2xl border border-white/10 bg-white/5 p-4"><div className="flex items-center gap-3"><img src={user.image} alt={user.name} className="h-12 w-12 rounded-full object-cover" /><div className="min-w-0 flex-1"><div className="font-semibold">{user.name}, {user.age}</div><div className="text-sm text-slate-400">{user.city} · {user.job} · {user.distance}</div></div></div><div className="mt-3 flex flex-wrap gap-2"><button type="button" onClick={()=>{ setModalProfile(user); setMainTab('discover'); }} className="rounded-2xl bg-white/10 px-4 py-2 text-sm font-medium">查看资料</button><button type="button" onClick={()=>toggleFavoriteDiscoverProfile(user.id)} className="rounded-2xl bg-rose-500 px-4 py-2 text-sm font-medium text-white">取消收藏</button></div></div>)}
            </div>
          </Panel>
          <Panel title="收藏统计" icon={<Icons.LayoutDashboard />}>
            <div className="grid gap-3 md:grid-cols-2">
              <Stat title="点赞视频" value={String(likedVideoPosts.length)} />

              <Stat title="收藏资料" value={String(favoriteDiscoverProfiles.length)} />

      {mainTab==='users' && <div className="grid gap-6 lg:grid-cols-[0.8fr_1.2fr]"><Panel title="按 QS 学校查找用户" icon={<Icons.Search />}><div className="space-y-3"><Input value={schoolQuery} onChange={setSchoolQuery} placeholder="输入学校名，例如 Taylor's / NUS / Imperial / UM" /><div className="rounded-2xl bg-slate-900/70 p-4 text-sm text-slate-300">当前结果：<span className="font-semibold text-white">{filteredUsers.length}</span> 位用户</div></div></Panel><Panel title="用户结果" icon={<Icons.Users />}><div className="grid gap-3 md:grid-cols-2">{filteredUsers.map((user)=><div key={user.id} className="rounded-2xl border border-white/10 bg-white/5 p-4"><div className="flex items-center gap-3"><img src={user.avatar} alt={user.name} className="h-14 w-14 rounded-full object-cover" /><div><div className="text-lg font-semibold">{user.name}</div><div className="text-sm text-slate-300">{user.school} · {user.qs}</div></div></div><p className="mt-3 text-sm text-slate-400">{user.bio}</p><div className="mt-3 flex flex-wrap gap-2">{user.interests.map((item)=><span key={item} className="rounded-full bg-white/10 px-3 py-1 text-xs">{item}</span>)}</div></div>)}</div></Panel></div>}

      {modalProfile && <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/80 p-4 backdrop-blur"><div className="grid w-full max-w-4xl overflow-hidden rounded-[28px] border border-white/10 bg-slate-900 shadow-2xl lg:grid-cols-[320px_1fr]"><img src={modalProfile.image} alt={modalProfile.name} className="h-full w-full object-cover" /><div className="p-6"><h3 className="text-2xl font-bold">{modalProfile.name}, {modalProfile.age}</h3><p className="mt-2 text-sm text-slate-400">{modalProfile.city} · {modalProfile.job} · 距离 {modalProfile.distance} · {modalProfile.online ? '当前在线' : '稍后回复'}</p><p className="mt-4 text-sm leading-7 text-slate-300">{modalProfile.bio}</p><div className="mt-4 flex flex-wrap gap-2">{modalProfile.tags.map((tag)=><span key={tag} className="rounded-full bg-white/10 px-3 py-1 text-xs">{tag}</span>)}{modalProfile.extras.map((tag)=><span key={tag} className="rounded-full bg-white/10 px-3 py-1 text-xs">{tag}</span>)}</div><div className="mt-6 flex flex-wrap gap-3"><button onClick={()=>setModalProfile(null)} className="rounded-2xl bg-white/10 px-4 py-3 text-sm font-medium">关闭</button><button onClick={()=>toggleFavoriteDiscoverProfile(modalProfile.id)} className="rounded-2xl bg-white/10 px-4 py-3 text-sm font-medium">{favSet.includes(modalProfile.id) ? '已收藏' : '收藏'}</button><HeartLikeButton active={likedSet.includes(modalProfile.id)} onClick={()=>likeDiscoverProfile(modalProfile.id)} /></div></div></div></div>}
      </div></div>;
    }

    class AppErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, message: '' };
      }
      static getDerivedStateFromError(error) {
        return { hasError: true, message: error?.stack || error?.message || String(error || 'Unknown error') };
      }
      componentDidCatch(error) {
        try { console.error('QS1000 App error:', error); } catch {}
      }
      render() {
        if (this.state.hasError) {
          return <div className="min-h-screen bg-slate-950 text-slate-100 p-6">
            <div className="mx-auto max-w-3xl rounded-[28px] border border-rose-400/30 bg-rose-500/10 p-6">
              <h1 className="text-2xl font-bold text-white">页面出现错误</h1>
              <p className="mt-3 text-sm text-slate-200">我已经阻止了整页黑屏。请把下面这段报错截图或发给我，我会继续直接修。</p>
              <pre className="mt-4 overflow-auto rounded-2xl bg-slate-950/80 p-4 text-xs text-rose-200 whitespace-pre-wrap">{this.state.message}</pre>
            </div>
          </div>;
        }
        return this.props.children;
      }
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<AppErrorBoundary><App /></AppErrorBoundary>);
  </script>
</body>
</html>
